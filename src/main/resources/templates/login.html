<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body class="gradient-custom d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="login-card text-white p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-person-circle" style="font-size: 60px;"></i>
                    <h3 class="mt-2">Bienvenido</h3>
                    <p class="text-white-50">Inicia sesión para continuar</p>
                </div>

                <form th:action="@{/login}" method="post">

                    <div class="mb-3 input-group">
                        <span class="input-group-text bg-dark border-0 text-white">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" 
                               name="username" 
                               class="form-control border-0" 
                               placeholder="Usuario" 
                               required>
                    </div>

                    <div class="mb-4 input-group">
                        <span class="input-group-text bg-dark border-0 text-white">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" 
                               name="password" 
                               id="password"
                               class="form-control border-0" 
                               placeholder="Contraseña" 
                               required>

                        <button type="button" class="btn btn-dark border-0" onclick="togglePassword()">
                            <i class="bi bi-eye" id="iconEye"></i>
                        </button>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-login rounded-pill">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </button>
                    </div>

                </form>

                <div class="mt-4 text-center">

                    <div th:if="${param.error}" class="alert alert-danger py-2">
                        Usuario o contraseña incorrectos
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success py-2">
                        Sesión cerrada correctamente
                    </div>

                    <div th:if="${param.disabled}" class="alert alert-warning py-2">
                        Tu usuario está desactivado.
                    </div>

                    <div th:if="${param.userNotFound}" class="alert alert-warning py-2">
                        El usuario no existe
                    </div>

                    <div th:if="${param.badCredentials}" class="alert alert-danger py-2">
                        Contraseña incorrecta
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.getElementById("iconEye");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}
</script>

<script th:inline="javascript">
/*<![CDATA[*/

let params = {
    error: /*[[${param.error != null}]]*/ false,
    badCredentials: /*[[${param.badCredentials != null}]]*/ false,
    userNotFound: /*[[${param.userNotFound != null}]]*/ false,
    disabled: /*[[${param.disabled != null}]]*/ false,
    logout: /*[[${param.logout != null}]]*/ false
};

if (params.disabled) {
    Swal.fire({
        icon: 'warning',
        title: 'Acceso denegado',
        text: 'Tu usuario está desactivado'
    });
}

else if (params.userNotFound) {
    Swal.fire({
        icon: 'question',
        title: 'Usuario no encontrado',
        text: 'El usuario no existe en el sistema'
    });
}

else if (params.badCredentials) {
    Swal.fire({
        icon: 'error',
        title: 'Error',
        text: 'Contraseña incorrecta'
    });
}

else if (params.logout) {
    Swal.fire({
        icon: 'success',
        title: 'Sesión cerrada',
        text: 'Has cerrado sesión correctamente'
    });
}

else if (params.error) {
    Swal.fire({
        icon: 'error',
        title: 'Error',
        text: 'Ocurrió un problema al iniciar sesión'
    });
}

/*]]>*/
</script>

</body>
</html>
