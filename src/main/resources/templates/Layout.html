<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Sistema">Sistema</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/css/getAll.css}">
    <link rel="stylesheet" th:href="@{/css/layaut.css}">


    <th:block layout:fragment="page-head"></th:block>
</head>

<body class="gradient-custom">

    <header>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-50 shadow-sm mb-4">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="bi bi-code-square me-2"></i>DIGIS01
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/home}">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Proyectos</a>
                        </li>
                    </ul>

                    <div class="d-flex align-items-center gap-3" th:if="${user != null}">
                        <span class="text-white small">
                            <i class="bi bi-person-circle me-1 text-warning"></i>
                            Bienvenido  
                            <span class="fw-bold"
                                th:text="${user.nombre + ' ' + user.apellidoPaterno + ' ' + user.apellidosMaterno}">
                            </span>
                            / 
                            <span class="text-white-50"
                                th:text="'ROL: ' + ${user.rol.nombreRol}">
                            </span>
                        </span>
                        
                        <span class="text-white-50 small">
                            <i class="bi bi-person-circle me-1"></i>
                            <span th:text="${user.userName}"></span>
                        </span>

                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="btn btn-logout btn-sm rounded-pill px-3">
                                <i class="bi bi-box-arrow-right me-1"></i> Salir
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">

        <div layout:fragment="body">
            </div>
    </main>

    <footer class="text-center text-white-50 py-4 mt-auto">
        <hr class="border-secondary opacity-25">
        <small>© 2026 RISOSU Soluciones Digitales</small>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
